<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lists Page</title>
  </head>
  <body>
    <div>
      <h1>Lists</h1>
    </div>
    <div>
      <h3>Ordered List</h3>
      <div>
        <ol type="i" start="100">
          <li>Item 1</li>
          <li>Nested List</li>
          <ol type="I" start="10">
            <li>Item 1</li>
            <li>Item 2</li>
          </ol>
          <li>Item 3</li>
        </ol>
      </div>
      <h3>Un-Ordered List</h3>
      <div>
        <ul style="list-style-type: circle">
          <li>Item 1</li>
          <li>Item 2</li>
          <li>Item 3</li>
        </ul>
      </div>
      <h3>Description List</h3>
      <div>
        <ul>
          <dt>Main 1</dt>
          <dd>- Sub-main 1</dd>
          <dd>- Sub-main 2</dd>
          <dd>- Sub-main 3</dd>
          <dt>Main 2</dt>
          <dd>- Sub-main 1</dd>
          <dd>- Sub-main 2</dd>
          <dd>- Sub-main 3</dd>
        </ul>
      </div>
    </div>
  </body>
</html>
