<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Element Attributes</title>
    <style>
      .red {
        color: red;
      }
      .blue {
        color: blue;
      }
    </style>
  </head>
  <body>
    <div>
      <h1>Element Attributes</h1>
    </div>
    <div>
      <h3 title="Style Attribute">1. Style Attribute</h3>
      <hr />
      <div class="red" title="Red Color">
        <p>Text in red color.</p>
      </div>
      <div class="blue" title="Blue Color">
        <p>Text in blue color.</p>
      </div>
      <hr />
    </div>
  </body>
</html>
