<!DOCTYPE html>
<html>

  <head>
    <title>CSS Integration</title>
    <style>
      .body-custom {
        font-family: Arial, sans-serif;
        margin: 20px;
        background-color: #f9f9f9;
        text-align: center;
      }

      .h1-custom {
        color: #000;
        opacity: 0.16;
        background-color: #ff0000ad;
        text-wrap: pretty;
        text-align: center;
      }

      .h2-custom {
        color: #000;
        opacity: 0.32;
        background-color: #00ff00ad;
        text-align: center;
      }

      .h3-custom {
        color: #000;
        opacity: 0.48;
        background-color: #0000ffad;
        text-align: center;
      }

      .h4-custom {
        color: #000;
        opacity: 0.64;
        background-color: #ffff00ad;
        text-align: center;
      }

      .h5-custom {
        color: #000;
        opacity: 0.80;
        background-color: #00ffffad;
        text-align: center;
      }

      .h6-custom {
        color: #000;
        opacity: 0.96;
        background-color: #ff00ffad;
        text-align: center;
      }

      .p-custom {
        font-size: 14px;
        color: #666;
      }

      .span-custom {
        font-weight: bold;
        color: #000;
      }
    </style>
  </head>

  <body>
    <div>
      <h1 style="text-align: center;">CSS Integration</h1>
      <div style="text-align: center;">Welcome to the CSS Integration Exercise</div>
      <!-- Apply CSS Classes define above under the `<style>` tag -->
      <h1 class="h1-custom">This is Heading 1</h1>
      <h2 class="h2-custom">This is Heading 2</h2>
      <h3 class="h3-custom">This is Heading 3</h3>
      <h4 class="h4-custom">This is Heading 4</h4>
      <h5 class="h5-custom">This is Heading 5</h5>
      <h6 class="h6-custom">This is Heading 6</h6>
      <p class="p-custom">- By: <span class="span-custom">Sagar Ghag</span>.</p>
    </div>
  </body>

</html>
