name: Update Progress & Deploy

on:
  push:
    branches: [ master, main, develop, beta ]
  pull_request:
    types: [closed]
    branches: [ master, main, develop, beta ]

# Required permissions for GitHub Pages deployment
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  update-progress:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.pull_request.merged == true)
    
    outputs:
      changes-made: ${{ steps.check-changes.outputs.changes }}
    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        token: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
    
    - name: Install Dependencies
      run: |
        if [ -f package-lock.json ]; then
          npm ci
        elif [ -f package.json ]; then
          npm install
        else
          echo "No package.json found, skipping npm install"
        fi
    
    - name: Execute Progress Update Command
      run: |
        echo "🔄 Executing progress update command..."
        
        # Your command goes here - replace this with your actual command
        npm run progress || echo "Progress script not found, continuing..."
        
        # Alternative: If you don't have npm script, run the Node.js file directly
        # node scripts/update-progress.js || echo "Progress script not found"
        
        # Alternative: If you want to run a bash script
        # ./scripts/update-progress.sh || echo "Progress script not found"
        
        echo "✅ Progress update command completed"
    
    - name: Check for Changes
      id: check-changes
      run: |
        # Check if any files were modified
        if git diff --quiet HEAD; then
          echo "changes=false" >> $GITHUB_OUTPUT
          echo "No changes detected"
        else
          echo "changes=true" >> $GITHUB_OUTPUT
          echo "Changes detected in:"
          git diff --name-only HEAD
        fi
    
    - name: Commit Updated Files
      if: steps.check-changes.outputs.changes == 'true'
      run: |
        git config --local user.name "github-actions[bot]"
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        
        # Add all modified files
        git add -A
        
        # Create commit with details
        BRANCH_NAME="${{ github.ref_name }}"
        COMMIT_SHA="${{ github.sha }}"
        
        git commit -m "🤖 Auto-update progress after merge to $BRANCH_NAME

        - Updated progress tracking files
        - Triggered by commit: ${COMMIT_SHA:0:7}
        - Branch: $BRANCH_NAME
        - Workflow: Update Progress & Deploy"
        
        # Push changes back to the branch
        git push origin HEAD:${{ github.ref_name }}
        
        echo "✅ Changes committed and pushed"

  deploy-pages:
    needs: update-progress
    runs-on: ubuntu-latest
    if: always() && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main')
    
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      with:
        ref: ${{ github.ref_name }}  # Get the latest changes including any commits from previous job
    
    - name: Setup Pages
      uses: actions/configure-pages@v4
    
    - name: Prepare Deployment Files
      run: |
        echo "📦 Preparing files for GitHub Pages deployment..."
        
        # Create deployment directory
        mkdir -p _site
        
        # Copy all necessary files to deployment directory
        cp index.html _site/ 2>/dev/null || echo "index.html not found"
        cp README.md _site/ 2>/dev/null || echo "README.md not found"
        cp -r assets _site/ 2>/dev/null || echo "assets directory not found"
        cp -r modules _site/ 2>/dev/null || echo "modules directory not found"
        cp -r final-project _site/ 2>/dev/null || echo "final-project directory not found"
        cp setup-guide.md _site/ 2>/dev/null || echo "setup-guide.md not found"
        cp progress-report.md _site/ 2>/dev/null || echo "progress-report.md not found"
        
        # Create a .nojekyll file to bypass Jekyll processing
        touch _site/.nojekyll
        
        # Create a simple 404 page if it doesn't exist
        if [ ! -f "_site/404.html" ]; then
          cat > _site/404.html << 'EOF'
        <!DOCTYPE html>
        <html>
        <head>
            <title>Page Not Found - Web Design Course</title>
            <meta charset="utf-8">
            <meta name="viewport" content="width=device-width, initial-scale=1">
            <style>
                body { font-family: Arial, sans-serif; text-align: center; padding: 50px; }
                h1 { color: #e74c3c; }
                a { color: #3498db; text-decoration: none; }
                a:hover { text-decoration: underline; }
            </style>
        </head>
        <body>
            <h1>404 - Page Not Found</h1>
            <p>The page you're looking for doesn't exist.</p>
            <p><a href="/">← Back to Course Dashboard</a></p>
        </body>
        </html>
        EOF
        fi
        
        echo "✅ Deployment files prepared"
        ls -la _site/
    
    - name: Upload Artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: '_site'
    
    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4
    
    - name: Display Deployment Info
      run: |
        echo "🚀 Deployment completed successfully!"
        echo "📍 Site URL: ${{ steps.deployment.outputs.page_url }}"
        echo "⏰ Deployed at: $(date)"
        echo ""
        echo "🔗 Your progress dashboard is now live at:"
        echo "${{ steps.deployment.outputs.page_url }}"

  notify-completion:
    needs: [update-progress, deploy-pages]
    runs-on: ubuntu-latest
    if: always()
    
    steps:
    - name: Workflow Summary
      run: |
        echo "📊 WORKFLOW EXECUTION SUMMARY"
        echo "════════════════════════════════════════"
        echo "🔄 Progress Update Job: ${{ needs.update-progress.result }}"
        echo "🚀 Pages Deployment Job: ${{ needs.deploy-pages.result }}"
        echo "📅 Execution Date: $(date)"
        echo "🌿 Branch: ${{ github.ref_name }}"
        echo "👤 Triggered by: ${{ github.actor }}"
        echo ""
        
        if [ "${{ needs.update-progress.result }}" = "success" ]; then
          echo "✅ Progress update completed successfully"
        else
          echo "❌ Progress update failed or was skipped"
        fi
        
        if [ "${{ needs.deploy-pages.result }}" = "success" ]; then
          echo "✅ GitHub Pages deployment completed successfully"
          echo "🔗 Your site should be available shortly at your GitHub Pages URL"
        elif [ "${{ needs.deploy-pages.result }}" = "skipped" ]; then
          echo "⏭️ GitHub Pages deployment skipped (not master/main branch)"
        else
          echo "❌ GitHub Pages deployment failed"
        fi
        
        echo ""
        echo "🎯 Next steps:"
        echo "1. Check your GitHub Pages URL for the updated site"
        echo "2. Verify progress tracking is working correctly"
        echo "3. Continue with your learning journey!"
