<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Progress Bar Test</title>
    <style>
      body {
        margin: 0;
        padding: 20px;
        background: linear-gradient(135deg, #1a1a1a, #2d2d30);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      }

      .test-card {
        background: linear-gradient(
          135deg,
          rgba(255, 255, 255, 0.1),
          rgba(255, 255, 255, 0.05)
        );
        backdrop-filter: blur(20px);
        border: 1px solid rgba(255, 255, 255, 0.2);
        border-radius: 20px;
        padding: 30px;
        margin: 20px;
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        transition: all 0.3s ease;
        cursor: pointer;
        text-align: center;
      }

      .test-card:hover {
        transform: translateY(-5px);
        box-shadow: 0 15px 40px rgba(0, 0, 0, 0.4);
      }

      .counter {
        font-size: 3em;
        color: #f2f2f7;
        font-weight: bold;
        margin: 20px 0;
        transition: all 0.3s ease;
      }

      .test-card:hover .counter {
        color: #ffffff;
        text-shadow: 0 0 25px rgba(242, 242, 247, 0.8);
      }

      .instructions {
        color: #a1a1a6;
        margin-top: 20px;
        font-size: 1.1em;
      }
    </style>
  </head>
  <body>
    <div class="test-card" id="testCard">
      <h2 style="color: #f2f2f7; margin-top: 0">Hover Test</h2>
      <div class="counter" id="counter">57%</div>
      <div class="instructions">Hover over this card to test the animation</div>
    </div>

    <script>
      class SimpleProgressTest {
        constructor() {
          this.card = document.getElementById("testCard");
          this.counter = document.getElementById("counter");
          this.currentProgress = 0;
          this.targetProgress = 57;
          this.isAnimating = false;

          this.setupEvents();
          console.log("Test initialized");
        }

        setupEvents() {
          this.card.addEventListener("mouseenter", () => {
            console.log("Mouse entered");
            this.animateProgress();
          });

          this.card.addEventListener("mouseleave", () => {
            console.log("Mouse left");
            this.resetProgress();
          });
        }

        animateProgress() {
          if (this.isAnimating) return;

          console.log("Starting animation");
          this.isAnimating = true;

          const startTime = performance.now();
          const animate = (currentTime) => {
            const elapsed = currentTime - startTime;
            const progress = Math.min(elapsed / 2000, 1); // 2 second animation

            const eased = 1 - Math.pow(1 - progress, 3); // easeOutCubic
            const currentValue = this.targetProgress * eased;

            this.counter.textContent = `${Math.round(currentValue)}%`;

            if (progress < 1) {
              requestAnimationFrame(animate);
            } else {
              this.isAnimating = false;
              console.log("Animation complete");
            }
          };

          requestAnimationFrame(animate);
        }

        resetProgress() {
          this.isAnimating = false;
          console.log("Resetting to completed state");

          const startTime = performance.now();
          const currentValue = parseInt(this.counter.textContent);

          const animate = (currentTime) => {
            const elapsed = currentTime - startTime;
            const progress = Math.min(elapsed / 800, 1); // 0.8 second reset

            const eased = progress * progress * progress; // easeInCubic
            const value =
              currentValue + (this.targetProgress - currentValue) * eased;

            this.counter.textContent = `${Math.round(value)}%`;

            if (progress < 1) {
              requestAnimationFrame(animate);
            }
          };

          requestAnimationFrame(animate);
        }
      }

      // Initialize when DOM is ready
      if (document.readyState === "loading") {
        document.addEventListener("DOMContentLoaded", () => {
          new SimpleProgressTest();
        });
      } else {
        new SimpleProgressTest();
      }
    </script>
  </body>
</html>
